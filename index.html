<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مربع به سوی نور | کلیک کن تا برود</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b0b15;
            font-family: system-ui, sans-serif;
            touch-action: none;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a18 100%);
        }

        .instruction {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.55);
            font-size: 15px;
            letter-spacing: 0.6px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 40px;
            background: rgba(20, 20, 40, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            user-select: none;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="instruction" id="instruction">✨ روی هر نقطه از صفحه کلیک/لمس کن · مربع به آنجا می‌رود</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const instructionEl = document.getElementById('instruction');

            // ---------- پیکربندی ----------
            const SQUARE_SIZE = 48;
            const MOVE_SPEED = 3.8;            // سرعت حرکت مربع (پیکسل در فریم)
            const ARRIVAL_THRESHOLD = 1.5;     // فاصله‌ای که در آن مربع "رسیده" محسوب می‌شود

            // رنگ‌ها
            const SQUARE_COLOR = '#f5e56c';
            const SQUARE_GLOW = 'rgba(245, 229, 108, 0.9)';
            const TARGET_COLOR = '#ffffff';
            const TARGET_GLOW = 'rgba(255, 255, 255, 0.9)';
            const TRAIL_COLOR = 'rgba(245, 229, 108, 0.35)';

            // موقعیت فعلی مربع
            let squareX = 300;
            let squareY = 250;

            // موقعیت هدف (جایی که کاربر کلیک کرده)
            let targetX = 300;
            let targetY = 250;
            let hasTarget = false;             // آیا هدفی وجود دارد که مربع به سمتش برود؟

            // مدیریت محو شدن هدف (نور کلیک)
            let targetAlpha = 0;               // شفافیت فعلی نشانگر هدف
            const TARGET_MAX_ALPHA = 0.9;
            const TARGET_FADE_SPEED = 0.025;   // سرعت محو شدن

            // دنباله نرم برای مربع
            const trailPositions = [];
            const TRAIL_LENGTH = 11;

            // ---------- توابع کمکی ----------
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                clampSquarePosition();
            }

            function clampSquarePosition() {
                if (squareX < 0) squareX = 0;
                if (squareY < 0) squareY = 0;
                if (squareX + SQUARE_SIZE > canvas.width) squareX = canvas.width - SQUARE_SIZE;
                if (squareY + SQUARE_SIZE > canvas.height) squareY = canvas.height - SQUARE_SIZE;
            }

            // دریافت مختصات کلیک/لمس نسبت به بوم
            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                let clientX, clientY;

                if (e.touches) {
                    if (e.touches.length === 0) return null;
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            // تنظیم هدف جدید
            function setTarget(canvasX, canvasY) {
                // محدود کردن هدف طوری که مرکز مربع بتواند به آن برسد
                // (هدف دقیقاً همان نقطه کلیک است، مربع طوری حرکت می‌کند که مرکزش به هدف برسد)
                let clampedX = canvasX;
                let clampedY = canvasY;

                // اختیاری: محدودیت ملایم برای اینکه هدف خیلی به لبه نچسبد
                // ولی می‌گذاریم آزاد باشد، مربع خودش به نزدیک‌ترین نقطه می‌رود.
                targetX = clampedX;
                targetY = clampedY;
                hasTarget = true;
                targetAlpha = TARGET_MAX_ALPHA;

                // مخفی کردن راهنما با تأخیر (اختیاری)
                instructionEl.style.opacity = '0.35';
                setTimeout(() => {
                    if (hasTarget) {
                        instructionEl.style.opacity = '0.55';
                    } else {
                        instructionEl.style.opacity = '1';
                    }
                }, 1200);
            }

            // ---------- رویدادهای اشاره‌گر ----------
            function onPointerDown(e) {
                e.preventDefault();
                const coords = getCanvasCoords(e);
                if (!coords) return;
                setTarget(coords.x, coords.y);
            }

            // جلوگیری از رفتار پیش‌فرض لمسی
            function preventTouchDefaults(e) {
                e.preventDefault();
            }

            // ---------- به‌روزرسانی منطق ----------
            function update() {
                // ذخیره موقعیت فعلی برای دنباله
                trailPositions.push({ x: squareX, y: squareY });
                while (trailPositions.length > TRAIL_LENGTH) {
                    trailPositions.shift();
                }

                // اگر هدفی وجود دارد، مربع را به سمت آن حرکت بده
                if (hasTarget) {
                    // مرکز مربع
                    const centerX = squareX + SQUARE_SIZE / 2;
                    const centerY = squareY + SQUARE_SIZE / 2;

                    // بردار به سمت هدف
                    const dx = targetX - centerX;
                    const dy = targetY - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance <= ARRIVAL_THRESHOLD) {
                        // رسیدیم به هدف
                        squareX = targetX - SQUARE_SIZE / 2;
                        squareY = targetY - SQUARE_SIZE / 2;
                        clampSquarePosition();
                        hasTarget = false;
                        // وقتی رسید، راهنما را دوباره پررنگ کن
                        instructionEl.style.opacity = '1';
                    } else {
                        // حرکت به سمت هدف با سرعت ثابت
                        const step = Math.min(MOVE_SPEED, distance);
                        const normX = dx / distance;
                        const normY = dy / distance;

                        squareX += normX * step;
                        squareY += normY * step;
                        clampSquarePosition();
                    }
                }

                // به‌روزرسانی محو شدن نشانگر هدف
                if (targetAlpha > 0 && !hasTarget) {
                    // اگر هدفی در کار نیست و آلفا هنوز مثبت است، محو شود
                    targetAlpha = Math.max(0, targetAlpha - TARGET_FADE_SPEED);
                } else if (hasTarget && targetAlpha < TARGET_MAX_ALPHA) {
                    // هنگام داشتن هدف، آلفا را بالا نگه دار (ولی به تدریج می‌تواند تنظیم شود)
                    targetAlpha = TARGET_MAX_ALPHA;
                }
            }

            // ---------- رسم صحنه ----------
            function drawScene() {
                if (!ctx || canvas.width === 0 || canvas.height === 0) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // ---- پس‌زمینه تزئینی (ذرات ریز) ----
                ctx.save();
                ctx.globalAlpha = 0.06;
                ctx.fillStyle = '#b0b0ff';
                const dotSpacing = 55;
                for (let i = dotSpacing; i < canvas.width; i += dotSpacing) {
                    for (let j = dotSpacing; j < canvas.height; j += dotSpacing) {
                        ctx.beginPath();
                        ctx.arc(i, j, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.restore();

                // ---- رسم نشانگر هدف (نور کلیک) ----
                if (targetAlpha > 0.01 || hasTarget) {
                    const alpha = Math.min(targetAlpha, TARGET_MAX_ALPHA);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    
                    // هاله بیرونی
                    const gradient = ctx.createRadialGradient(targetX, targetY, 4, targetX, targetY, 32);
                    gradient.addColorStop(0, TARGET_GLOW);
                    gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.4)');
                    gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
                    ctx.fillStyle = gradient;
                    ctx.shadowColor = TARGET_GLOW;
                    ctx.shadowBlur = 18;
                    ctx.beginPath();
                    ctx.arc(targetX, targetY, 28, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // نقطه مرکزی
                    ctx.shadowBlur = 14;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(targetX, targetY, 5.5, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // حلقه داخلی
                    ctx.shadowBlur = 6;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(targetX, targetY, 10, 0, 2 * Math.PI);
                    ctx.stroke();
                    
                    ctx.restore();
                }

                // ---- رسم دنباله مربع ----
                if (trailPositions.length > 1) {
                    ctx.save();
                    for (let i = 0; i < trailPositions.length; i++) {
                        const pos = trailPositions[i];
                        const progress = i / (trailPositions.length - 1 || 1);
                        const alpha = 0.04 + progress * 0.22;
                        const scale = 0.6 + progress * 0.4;
                        const trailSize = SQUARE_SIZE * scale;
                        const offset = (SQUARE_SIZE - trailSize) / 2;

                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = SQUARE_COLOR;
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        
                        const rx = 4 * scale;
                        ctx.beginPath();
                        const dx = pos.x + offset;
                        const dy = pos.y + offset;
                        ctx.moveTo(dx + rx, dy);
                        ctx.lineTo(dx + trailSize - rx, dy);
                        ctx.quadraticCurveTo(dx + trailSize, dy, dx + trailSize, dy + rx);
                        ctx.lineTo(dx + trailSize, dy + trailSize - rx);
                        ctx.quadraticCurveTo(dx + trailSize, dy + trailSize, dx + trailSize - rx, dy + trailSize);
                        ctx.lineTo(dx + rx, dy + trailSize);
                        ctx.quadraticCurveTo(dx, dy + trailSize, dx, dy + trailSize - rx);
                        ctx.lineTo(dx, dy + rx);
                        ctx.quadraticCurveTo(dx, dy, dx + rx, dy);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.restore();
                }

                // ---- رسم مربع اصلی ----
                ctx.save();
                ctx.shadowColor = SQUARE_GLOW;
                ctx.shadowBlur = 24;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = SQUARE_COLOR;

                const radius = 7;
                ctx.beginPath();
                ctx.moveTo(squareX + radius, squareY);
                ctx.lineTo(squareX + SQUARE_SIZE - radius, squareY);
                ctx.quadraticCurveTo(squareX + SQUARE_SIZE, squareY, squareX + SQUARE_SIZE, squareY + radius);
                ctx.lineTo(squareX + SQUARE_SIZE, squareY + SQUARE_SIZE - radius);
                ctx.quadraticCurveTo(squareX + SQUARE_SIZE, squareY + SQUARE_SIZE, squareX + SQUARE_SIZE - radius, squareY + SQUARE_SIZE);
                ctx.lineTo(squareX + radius, squareY + SQUARE_SIZE);
                ctx.quadraticCurveTo(squareX, squareY + SQUARE_SIZE, squareX, squareY + SQUARE_SIZE - radius);
                ctx.lineTo(squareX, squareY + radius);
                ctx.quadraticCurveTo(squareX, squareY, squareX + radius, squareY);
                ctx.closePath();
                ctx.fill();

                // خط دور
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 255, 245, 0.65)';
                ctx.lineWidth = 1.6;
                ctx.stroke();

                // نقطه مرکزی مربع
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(255, 255, 230, 0.9)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(squareX + SQUARE_SIZE/2, squareY + SQUARE_SIZE/2, 3.8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();

                // خط نازک بین مربع و هدف (اگر هدف فعال است)
                if (hasTarget && targetAlpha > 0.1) {
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.2;
                    ctx.setLineDash([6, 8]);
                    ctx.beginPath();
                    ctx.moveTo(squareX + SQUARE_SIZE/2, squareY + SQUARE_SIZE/2);
                    ctx.lineTo(targetX, targetY);
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // ---------- حلقه انیمیشن ----------
            function animationLoop() {
                update();
                drawScene();
                requestAnimationFrame(animationLoop);
            }

            // ---------- نصب رویدادها ----------
            window.addEventListener('resize', resizeCanvas);

            // ماوس
            canvas.addEventListener('mousedown', onPointerDown);
            // لمس
            canvas.addEventListener('touchstart', onPointerDown, { passive: false });
            document.addEventListener('touchmove', preventTouchDefaults, { passive: false });
            document.addEventListener('gesturestart', preventTouchDefaults);
            document.addEventListener('gesturechange', preventTouchDefaults);
            document.addEventListener('gestureend', preventTouchDefaults);

            // ---------- راه‌اندازی ----------
            function init() {
                resizeCanvas();
                
                // موقعیت اولیه وسط صفحه
                squareX = (canvas.width - SQUARE_SIZE) / 2;
                squareY = (canvas.height - SQUARE_SIZE) / 2;
                clampSquarePosition();
                
                // هدف اولیه برابر با موقعیت مربع (بدون هدف فعال)
                targetX = squareX + SQUARE_SIZE/2;
                targetY = squareY + SQUARE_SIZE/2;
                hasTarget = false;
                targetAlpha = 0;
                
                // پر کردن دنباله
                trailPositions.length = 0;
                for (let i = 0; i < TRAIL_LENGTH; i++) {
                    trailPositions.push({ x: squareX, y: squareY });
                }
                
                instructionEl.style.opacity = '1';
                animationLoop();
            }

            init();

            // پاکسازی (اختیاری)
            window.addEventListener('beforeunload', () => {
                canvas.removeEventListener('mousedown', onPointerDown);
                canvas.removeEventListener('touchstart', onPointerDown);
                document.removeEventListener('touchmove', preventTouchDefaults);
            });
        })();
    </script>
</body>
</html>
