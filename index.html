<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دنیای بزرگ با مانع · مسیریابی هوشمند</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .instruction {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(6px);
            padding: 6px 22px;
            border-radius: 30px;
            background: rgba(15, 15, 30, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="instruction">🔴 مانع قرمز در مرکز · مربع راهش را پیدا می‌کند · مینیمپ بالا راست</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ==================== ابعاد دنیا ====================
            const WORLD_MULTIPLIER = 6;
            let worldWidth = 2400;
            let worldHeight = 1800;

            // ==================== تنظیمات مربع ====================
            const SQUARE_SIZE = 46;
            const MOVE_SPEED = 3.8;
            const ARRIVAL_THRESHOLD = 2.2;

            let squareWorldX = 400;
            let squareWorldY = 350;

            // هدف
            let targetWorldX = 400;
            let targetWorldY = 350;
            let hasTarget = false;

            // مسیر جایگزین (نقاط میانی برای دور زدن مانع)
            let waypoints = [];
            
            let targetAlpha = 0;
            const TARGET_MAX_ALPHA = 0.95;
            const TARGET_FADE_SPEED = 0.028;

            // دنباله
            const trailPositions = [];
            const TRAIL_LENGTH = 12;

            // ==================== مانع دایره‌ای ====================
            let obstacleCenterX = 1200;  // وسط دنیا (با resize تنظیم می‌شود)
            let obstacleCenterY = 900;
            const OBSTACLE_RADIUS = 160;
            const OBSTACLE_BUFFER = 12;  // فاصله امن اضافی از لبه مانع

            // ==================== دوربین ====================
            let cameraX = 0;
            let cameraY = 0;
            const CAMERA_MARGIN = 180;

            // ==================== مینیمپ ====================
            const MINIMAP_WIDTH = 155;
            const MINIMAP_HEIGHT = 110;
            const MINIMAP_PADDING = 16;
            const MINIMAP_BORDER_RADIUS = 10;

            // ==================== رنگ‌ها ====================
            const COLORS = {
                square: '#f7e358',
                squareGlow: 'rgba(247, 227, 88, 0.85)',
                obstacle: '#e63946',
                obstacleGlow: 'rgba(230, 57, 70, 0.7)',
                obstacleBorder: '#ff6b6b',
                target: '#ffffff',
                targetGlow: 'rgba(255, 255, 255, 0.95)',
                trail: 'rgba(247, 227, 88, 0.3)',
                worldBg: '#0f0f1f',
                gridLines: 'rgba(180, 180, 255, 0.1)',
                gridDots: 'rgba(200, 200, 255, 0.14)',
                minimapBg: 'rgba(10, 10, 22, 0.75)',
                minimapBorder: 'rgba(255, 255, 255, 0.35)',
                waypoint: '#ff9f1c',
                waypointGlow: 'rgba(255, 159, 28, 0.7)',
            };

            // ==================== توابع هندسی ====================
            function updateWorldSize() {
                worldWidth = window.innerWidth * WORLD_MULTIPLIER;
                worldHeight = window.innerHeight * WORLD_MULTIPLIER;
                obstacleCenterX = worldWidth / 2;
                obstacleCenterY = worldHeight / 2;
            }

            function clampSquareToWorld() {
                if (squareWorldX < 0) squareWorldX = 0;
                if (squareWorldY < 0) squareWorldY = 0;
                if (squareWorldX + SQUARE_SIZE > worldWidth) squareWorldX = worldWidth - SQUARE_SIZE;
                if (squareWorldY + SQUARE_SIZE > worldHeight) squareWorldY = worldHeight - SQUARE_SIZE;
            }

            // بررسی برخورد یک نقطه با مانع
            function isPointInsideObstacle(px, py, buffer = 0) {
                const dx = px - obstacleCenterX;
                const dy = py - obstacleCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < OBSTACLE_RADIUS + buffer;
            }

            // بررسی برخورد مربع (با گوشه‌ها) با مانع
            function isSquareCollidingWithObstacle(sx, sy, buffer = 0) {
                // بررسی چهار گوشه مربع
                const corners = [
                    { x: sx, y: sy },
                    { x: sx + SQUARE_SIZE, y: sy },
                    { x: sx, y: sy + SQUARE_SIZE },
                    { x: sx + SQUARE_SIZE, y: sy + SQUARE_SIZE }
                ];
                
                for (const corner of corners) {
                    if (isPointInsideObstacle(corner.x, corner.y, buffer)) {
                        return true;
                    }
                }
                
                // بررسی مرکز مربع
                const centerX = sx + SQUARE_SIZE / 2;
                const centerY = sy + SQUARE_SIZE / 2;
                if (isPointInsideObstacle(centerX, centerY, buffer)) {
                    return true;
                }
                
                return false;
            }

            // پیدا کردن نزدیک‌ترین نقطه امن روی لبه مانع
            function getClosestSafePointOnObstacle(worldX, worldY) {
                const dx = worldX - obstacleCenterX;
                const dy = worldY - obstacleCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 0.01) {
                    // اگر دقیقاً روی مرکز باشد، یک نقطه تصادفی روی لبه
                    const angle = Math.random() * Math.PI * 2;
                    return {
                        x: obstacleCenterX + Math.cos(angle) * (OBSTACLE_RADIUS + OBSTACLE_BUFFER + SQUARE_SIZE/2),
                        y: obstacleCenterY + Math.sin(angle) * (OBSTACLE_RADIUS + OBSTACLE_BUFFER + SQUARE_SIZE/2)
                    };
                }
                
                const safeDist = OBSTACLE_RADIUS + OBSTACLE_BUFFER + SQUARE_SIZE / 2;
                const normX = dx / dist;
                const normY = dy / dist;
                
                return {
                    x: obstacleCenterX + normX * safeDist,
                    y: obstacleCenterY + normY * safeDist
                };
            }

            // بررسی اینکه خط بین دو نقطه با مانع برخورد می‌کند یا خیر
            function doesLineIntersectObstacle(x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const fx = x1 - obstacleCenterX;
                const fy = y1 - obstacleCenterY;
                
                const a = dx * dx + dy * dy;
                const b = 2 * (fx * dx + fy * dy);
                const c = fx * fx + fy * fy - (OBSTACLE_RADIUS + OBSTACLE_BUFFER + SQUARE_SIZE/2) ** 2;
                
                let discriminant = b * b - 4 * a * c;
                
                if (discriminant < 0) return false;
                
                discriminant = Math.sqrt(discriminant);
                const t1 = (-b - discriminant) / (2 * a);
                const t2 = (-b + discriminant) / (2 * a);
                
                if (t1 >= 0 && t1 <= 1) return true;
                if (t2 >= 0 && t2 <= 1) return true;
                
                return false;
            }

            // محاسبه مسیر با دور زدن مانع
            function calculatePathWithObstacleAvoidance(fromX, fromY, toX, toY) {
                const path = [];
                
                // اگر مسیر مستقیم با مانع برخورد نکند
                if (!doesLineIntersectObstacle(fromX, fromY, toX, toY)) {
                    return path; // مسیر خالی = مستقیم برو
                }
                
                // پیدا کردن نقاط مماس بر مانع
                const fromSafe = getClosestSafePointOnObstacle(fromX, fromY);
                const toSafe = getClosestSafePointOnObstacle(toX, toY);
                
                // زاویه بین دو نقطه روی لبه
                const angleFrom = Math.atan2(fromSafe.y - obstacleCenterY, fromSafe.x - obstacleCenterX);
                const angleTo = Math.atan2(toSafe.y - obstacleCenterY, toSafe.x - obstacleCenterX);
                
                // انتخاب جهت دور زدن (کوتاه‌ترین مسیر دور مانع)
                let angleDiff = angleTo - angleFrom;
                while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
                while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
                
                const safeRadius = OBSTACLE_RADIUS + OBSTACLE_BUFFER + SQUARE_SIZE / 2;
                
                // اضافه کردن نقطه میانی برای دور زدن
                const midAngle = angleFrom + angleDiff / 2;
                const midPoint = {
                    x: obstacleCenterX + Math.cos(midAngle) * safeRadius * 1.3,
                    y: obstacleCenterY + Math.sin(midAngle) * safeRadius * 1.3
                };
                
                // اطمینان از اینکه نقطه میانی داخل دنیاست
                midPoint.x = Math.max(SQUARE_SIZE, Math.min(worldWidth - SQUARE_SIZE, midPoint.x));
                midPoint.y = Math.max(SQUARE_SIZE, Math.min(worldHeight - SQUARE_SIZE, midPoint.y));
                
                path.push(midPoint);
                
                return path;
            }

            function updateCamera() {
                const viewWidth = canvas.width;
                const viewHeight = canvas.height;
                const squareCenterX = squareWorldX + SQUARE_SIZE / 2;
                const squareCenterY = squareWorldY + SQUARE_SIZE / 2;

                let targetCamX = cameraX;
                let targetCamY = cameraY;

                const leftEdge = cameraX + CAMERA_MARGIN;
                const rightEdge = cameraX + viewWidth - CAMERA_MARGIN;
                const topEdge = cameraY + CAMERA_MARGIN;
                const bottomEdge = cameraY + viewHeight - CAMERA_MARGIN;

                if (squareCenterX < leftEdge) {
                    targetCamX = squareCenterX - CAMERA_MARGIN;
                } else if (squareCenterX > rightEdge) {
                    targetCamX = squareCenterX - viewWidth + CAMERA_MARGIN;
                }

                if (squareCenterY < topEdge) {
                    targetCamY = squareCenterY - CAMERA_MARGIN;
                } else if (squareCenterY > bottomEdge) {
                    targetCamY = squareCenterY - viewHeight + CAMERA_MARGIN;
                }

                if (targetCamX < 0) targetCamX = 0;
                if (targetCamY < 0) targetCamY = 0;
                if (targetCamX + viewWidth > worldWidth) targetCamX = worldWidth - viewWidth;
                if (targetCamY + viewHeight > worldHeight) targetCamY = worldHeight - viewHeight;

                cameraX += (targetCamX - cameraX) * 0.12;
                cameraY += (targetCamY - cameraY) * 0.12;

                cameraX = Math.max(0, Math.min(cameraX, worldWidth - viewWidth));
                cameraY = Math.max(0, Math.min(cameraY, worldHeight - viewHeight));
            }

            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                let clientX, clientY;
                if (e.touches) {
                    if (e.touches.length === 0) return null;
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function screenToWorld(screenX, screenY) {
                return {
                    x: screenX + cameraX,
                    y: screenY + cameraY
                };
            }

            function setTarget(worldX, worldY) {
                // هدف نمی‌تواند داخل مانع باشد
                if (isPointInsideObstacle(worldX, worldY, SQUARE_SIZE/2)) {
                    const safePoint = getClosestSafePointOnObstacle(worldX, worldY);
                    targetWorldX = safePoint.x;
                    targetWorldY = safePoint.y;
                } else {
                    targetWorldX = Math.max(SQUARE_SIZE/2, Math.min(worldX, worldWidth - SQUARE_SIZE/2));
                    targetWorldY = Math.max(SQUARE_SIZE/2, Math.min(worldY, worldHeight - SQUARE_SIZE/2));
                }
                
                // محاسبه مسیر
                const centerX = squareWorldX + SQUARE_SIZE / 2;
                const centerY = squareWorldY + SQUARE_SIZE / 2;
                waypoints = calculatePathWithObstacleAvoidance(centerX, centerY, targetWorldX, targetWorldY);
                
                hasTarget = true;
                targetAlpha = TARGET_MAX_ALPHA;
            }

            // ==================== رویدادها ====================
            function onPointerDown(e) {
                e.preventDefault();
                const coords = getCanvasCoords(e);
                if (!coords) return;
                const worldPos = screenToWorld(coords.x, coords.y);
                setTarget(worldPos.x, worldPos.y);
            }

            function preventTouchDefaults(e) {
                e.preventDefault();
            }

            // ==================== به‌روزرسانی ====================
            function update() {
                trailPositions.push({ x: squareWorldX, y: squareWorldY });
                while (trailPositions.length > TRAIL_LENGTH) {
                    trailPositions.shift();
                }

                if (hasTarget) {
                    let targetX = targetWorldX;
                    let targetY = targetWorldY;
                    
                    // اگر مسیر میانی داریم، اول به نقطه میانی برو
                    if (waypoints.length > 0) {
                        targetX = waypoints[0].x;
                        targetY = waypoints[0].y;
                    }
                    
                    const centerX = squareWorldX + SQUARE_SIZE / 2;
                    const centerY = squareWorldY + SQUARE_SIZE / 2;
                    const dx = targetX - centerX;
                    const dy = targetY - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance <= ARRIVAL_THRESHOLD) {
                        if (waypoints.length > 0) {
                            // رسیدیم به نقطه میانی، حذفش کن
                            waypoints.shift();
                        } else {
                            // رسیدیم به هدف نهایی
                            squareWorldX = targetWorldX - SQUARE_SIZE / 2;
                            squareWorldY = targetWorldY - SQUARE_SIZE / 2;
                            clampSquareToWorld();
                            hasTarget = false;
                        }
                    } else {
                        const step = Math.min(MOVE_SPEED, distance);
                        const normX = dx / distance;
                        const normY = dy / distance;
                        
                        let newX = squareWorldX + normX * step;
                        let newY = squareWorldY + normY * step;
                        
                        // بررسی برخورد با مانع
                        if (isSquareCollidingWithObstacle(newX, newY, OBSTACLE_BUFFER)) {
                            // اگر برخورد کرد، مسیر را دوباره محاسبه کن
                            const newCenterX = newX + SQUARE_SIZE / 2;
                            const newCenterY = newY + SQUARE_SIZE / 2;
                            waypoints = calculatePathWithObstacleAvoidance(newCenterX, newCenterY, targetWorldX, targetWorldY);
                            
                            // سعی کن به سمت نقطه امن حرکت کنی
                            const safePoint = getClosestSafePointOnObstacle(centerX, centerY);
                            const sdx = safePoint.x - centerX;
                            const sdy = safePoint.y - centerY;
                            const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                            
                            if (sdist > 0.01) {
                                newX = squareWorldX + (sdx / sdist) * step;
                                newY = squareWorldY + (sdy / sdist) * step;
                            }
                        }
                        
                        squareWorldX = newX;
                        squareWorldY = newY;
                        clampSquareToWorld();
                        
                        // اطمینان از اینکه داخل مانع نیستیم
                        if (isSquareCollidingWithObstacle(squareWorldX, squareWorldY, 0)) {
                            const safePoint = getClosestSafePointOnObstacle(
                                squareWorldX + SQUARE_SIZE/2,
                                squareWorldY + SQUARE_SIZE/2
                            );
                            squareWorldX = safePoint.x - SQUARE_SIZE/2;
                            squareWorldY = safePoint.y - SQUARE_SIZE/2;
                            clampSquareToWorld();
                        }
                    }
                }

                updateCamera();

                if (!hasTarget && targetAlpha > 0) {
                    targetAlpha = Math.max(0, targetAlpha - TARGET_FADE_SPEED);
                } else if (hasTarget) {
                    targetAlpha = TARGET_MAX_ALPHA;
                }
            }

            // ==================== رسم ====================
            function drawWorld() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = COLORS.worldBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(-cameraX, -cameraY);

                // شبکه
                ctx.strokeStyle = COLORS.gridLines;
                ctx.lineWidth = 0.8;
                const gridStep = 110;
                const startX = Math.floor(cameraX / gridStep) * gridStep;
                const startY = Math.floor(cameraY / gridStep) * gridStep;
                const endX = cameraX + canvas.width + gridStep;
                const endY = cameraY + canvas.height + gridStep;

                for (let x = startX; x <= endX; x += gridStep) {
                    ctx.beginPath();
                    ctx.moveTo(x, startY);
                    ctx.lineTo(x, endY);
                    ctx.stroke();
                }
                for (let y = startY; y <= endY; y += gridStep) {
                    ctx.beginPath();
                    ctx.moveTo(startX, y);
                    ctx.lineTo(endX, y);
                    ctx.stroke();
                }

                // نقاط ریز
                ctx.fillStyle = COLORS.gridDots;
                const dotStep = 45;
                const dotStartX = Math.floor(cameraX / dotStep) * dotStep;
                const dotStartY = Math.floor(cameraY / dotStep) * dotStep;
                for (let x = dotStartX; x <= endX; x += dotStep) {
                    for (let y = dotStartY; y <= endY; y += dotStep) {
                        ctx.beginPath();
                        ctx.arc(x, y, 1.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // مرزهای دنیا
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(0, 0, worldWidth, worldHeight);

                // ---- رسم مانع ----
                ctx.save();
                // هاله بیرونی
                const obstacleGrad = ctx.createRadialGradient(
                    obstacleCenterX, obstacleCenterY, OBSTACLE_RADIUS * 0.7,
                    obstacleCenterX, obstacleCenterY, OBSTACLE_RADIUS * 1.5
                );
                obstacleGrad.addColorStop(0, COLORS.obstacleGlow);
                obstacleGrad.addColorStop(0.6, 'rgba(230, 57, 70, 0.15)');
                obstacleGrad.addColorStop(1, 'rgba(230, 57, 70, 0)');
                ctx.fillStyle = obstacleGrad;
                ctx.shadowColor = COLORS.obstacleGlow;
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(obstacleCenterX, obstacleCenterY, OBSTACLE_RADIUS * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // دایره اصلی
                ctx.shadowBlur = 20;
                ctx.fillStyle = COLORS.obstacle;
                ctx.beginPath();
                ctx.arc(obstacleCenterX, obstacleCenterY, OBSTACLE_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // خط دور
                ctx.shadowBlur = 8;
                ctx.strokeStyle = COLORS.obstacleBorder;
                ctx.lineWidth = 3;
                ctx.stroke();

                // الگوی داخلی
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                for (let i = 1; i <= 3; i++) {
                    ctx.beginPath();
                    ctx.arc(obstacleCenterX, obstacleCenterY, OBSTACLE_RADIUS * (i * 0.22), 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();

                // ---- نقاط مسیر (waypoints) ----
                if (waypoints.length > 0 && hasTarget) {
                    ctx.save();
                    ctx.fillStyle = COLORS.waypoint;
                    ctx.shadowColor = COLORS.waypointGlow;
                    ctx.shadowBlur = 12;
                    for (const wp of waypoints) {
                        ctx.beginPath();
                        ctx.arc(wp.x, wp.y, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                // ---- نشانگر هدف ----
                if (targetAlpha > 0.01) {
                    ctx.save();
                    ctx.globalAlpha = targetAlpha;
                    const grad = ctx.createRadialGradient(targetWorldX, targetWorldY, 3, targetWorldX, targetWorldY, 30);
                    grad.addColorStop(0, COLORS.targetGlow);
                    grad.addColorStop(0.6, 'rgba(255,255,255,0.3)');
                    grad.addColorStop(1, 'rgba(255,255,200,0)');
                    ctx.fillStyle = grad;
                    ctx.shadowColor = COLORS.targetGlow;
                    ctx.shadowBlur = 16;
                    ctx.beginPath();
                    ctx.arc(targetWorldX, targetWorldY, 24, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(targetWorldX, targetWorldY, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // ---- دنباله ----
                if (trailPositions.length > 1) {
                    ctx.save();
                    for (let i = 0; i < trailPositions.length; i++) {
                        const pos = trailPositions[i];
                        const progress = i / (trailPositions.length - 1 || 1);
                        const alpha = 0.04 + progress * 0.2;
                        const scale = 0.55 + progress * 0.45;
                        const tSize = SQUARE_SIZE * scale;
                        const offset = (SQUARE_SIZE - tSize) / 2;
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = COLORS.square;
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        const rx = 3.5 * scale;
                        const dx = pos.x + offset;
                        const dy = pos.y + offset;
                        ctx.beginPath();
                        ctx.moveTo(dx + rx, dy);
                        ctx.lineTo(dx + tSize - rx, dy);
                        ctx.quadraticCurveTo(dx + tSize, dy, dx + tSize, dy + rx);
                        ctx.lineTo(dx + tSize, dy + tSize - rx);
                        ctx.quadraticCurveTo(dx + tSize, dy + tSize, dx + tSize - rx, dy + tSize);
                        ctx.lineTo(dx + rx, dy + tSize);
                        ctx.quadraticCurveTo(dx, dy + tSize, dx, dy + tSize - rx);
                        ctx.lineTo(dx, dy + rx);
                        ctx.quadraticCurveTo(dx, dy, dx + rx, dy);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.restore();
                }

                // ---- مربع اصلی ----
                ctx.save();
                ctx.shadowColor = COLORS.squareGlow;
                ctx.shadowBlur = 22;
                ctx.fillStyle = COLORS.square;
                const r = 6;
                ctx.beginPath();
                ctx.moveTo(squareWorldX + r, squareWorldY);
                ctx.lineTo(squareWorldX + SQUARE_SIZE - r, squareWorldY);
                ctx.quadraticCurveTo(squareWorldX + SQUARE_SIZE, squareWorldY, squareWorldX + SQUARE_SIZE, squareWorldY + r);
                ctx.lineTo(squareWorldX + SQUARE_SIZE, squareWorldY + SQUARE_SIZE - r);
                ctx.quadraticCurveTo(squareWorldX + SQUARE_SIZE, squareWorldY + SQUARE_SIZE, squareWorldX + SQUARE_SIZE - r, squareWorldY + SQUARE_SIZE);
                ctx.lineTo(squareWorldX + r, squareWorldY + SQUARE_SIZE);
                ctx.quadraticCurveTo(squareWorldX, squareWorldY + SQUARE_SIZE, squareWorldX, squareWorldY + SQUARE_SIZE - r);
                ctx.lineTo(squareWorldX, squareWorldY + r);
                ctx.quadraticCurveTo(squareWorldX, squareWorldY, squareWorldX + r, squareWorldY);
                ctx.closePath();
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,245,0.7)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(255,255,230,0.9)';
                ctx.shadowBlur = 9;
                ctx.beginPath();
                ctx.arc(squareWorldX + SQUARE_SIZE/2, squareWorldY + SQUARE_SIZE/2, 3.5, 0, 2*Math.PI);
                ctx.fill();
                ctx.restore();

                // خط چین به هدف
                if (hasTarget && targetAlpha > 0.15) {
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.3;
                    ctx.setLineDash([7, 9]);
                    ctx.beginPath();
                    ctx.moveTo(squareWorldX + SQUARE_SIZE/2, squareWorldY + SQUARE_SIZE/2);
                    if (waypoints.length > 0) {
                        ctx.lineTo(waypoints[0].x, waypoints[0].y);
                    } else {
                        ctx.lineTo(targetWorldX, targetWorldY);
                    }
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.restore();
            }

            function drawMinimap() {
                const mmX = canvas.width - MINIMAP_WIDTH - MINIMAP_PADDING;
                const mmY = MINIMAP_PADDING;

                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 12;
                ctx.fillStyle = COLORS.minimapBg;
                ctx.strokeStyle = COLORS.minimapBorder;
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.roundRect(mmX, mmY, MINIMAP_WIDTH, MINIMAP_HEIGHT, MINIMAP_BORDER_RADIUS);
                ctx.fill();
                ctx.stroke();
                ctx.restore();

                const margin = 4;
                const mapLeft = mmX + margin;
                const mapTop = mmY + margin;
                const mapWidth = MINIMAP_WIDTH - margin * 2;
                const mapHeight = MINIMAP_HEIGHT - margin * 2;
                const scaleX = mapWidth / worldWidth;
                const scaleY = mapHeight / worldHeight;

                ctx.save();
                ctx.beginPath();
                ctx.roundRect(mmX, mmY, MINIMAP_WIDTH, MINIMAP_HEIGHT, MINIMAP_BORDER_RADIUS);
                ctx.clip();

                ctx.fillStyle = 'rgba(25, 25, 45, 0.8)';
                ctx.fillRect(mapLeft, mapTop, mapWidth, mapHeight);

                // مانع در مینیمپ
                const obsMiniX = mapLeft + obstacleCenterX * scaleX;
                const obsMiniY = mapTop + obstacleCenterY * scaleY;
                const obsMiniR = OBSTACLE_RADIUS * scaleX;
                ctx.fillStyle = COLORS.obstacle;
                ctx.beginPath();
                ctx.arc(obsMiniX, obsMiniY, Math.max(obsMiniR, 3), 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = COLORS.obstacleBorder;
                ctx.lineWidth = 0.8;
                ctx.stroke();

                // شبکه ریز
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 0.3;
                for (let wx = 0; wx <= worldWidth; wx += 200) {
                    const sx = mapLeft + wx * scaleX;
                    ctx.beginPath();
                    ctx.moveTo(sx, mapTop);
                    ctx.lineTo(sx, mapTop + mapHeight);
                    ctx.stroke();
                }
                for (let wy = 0; wy <= worldHeight; wy += 200) {
                    const sy = mapTop + wy * scaleY;
                    ctx.beginPath();
                    ctx.moveTo(mapLeft, sy);
                    ctx.lineTo(mapLeft + mapWidth, sy);
                    ctx.stroke();
                }

                // محدوده دید
                const viewLeft = mapLeft + cameraX * scaleX;
                const viewTop = mapTop + cameraY * scaleY;
                const viewW = canvas.width * scaleX;
                const viewH = canvas.height * scaleY;
                ctx.strokeStyle = COLORS.minimapBorder;
                ctx.lineWidth = 1.8;
                ctx.strokeRect(viewLeft, viewTop, viewW, viewH);

                // مربع
                const sqMiniX = mapLeft + squareWorldX * scaleX;
                const sqMiniY = mapTop + squareWorldY * scaleY;
                const sqMiniSize = Math.max(3.5, SQUARE_SIZE * scaleX);
                ctx.fillStyle = COLORS.square;
                ctx.fillRect(sqMiniX, sqMiniY, sqMiniSize, sqMiniSize);

                // هدف
                if (hasTarget || targetAlpha > 0.1) {
                    const tMiniX = mapLeft + targetWorldX * scaleX;
                    const tMiniY = mapTop + targetWorldY * scaleY;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(tMiniX, tMiniY, 2.4, 0, 2*Math.PI);
                    ctx.fill();
                }

                ctx.restore();

                ctx.save();
                ctx.font = '9px system-ui';
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillText('نقشه', mmX + 6, mmY + 14);
                ctx.restore();
            }

            function animationLoop() {
                update();
                drawWorld();
                drawMinimap();
                requestAnimationFrame(animationLoop);
            }

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                updateWorldSize();
                clampSquareToWorld();
                updateCamera();
            }

            window.addEventListener('resize', resizeCanvas);

            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('touchstart', onPointerDown, { passive: false });
            document.addEventListener('touchmove', preventTouchDefaults, { passive: false });
            document.addEventListener('gesturestart', preventTouchDefaults);
            document.addEventListener('gesturechange', preventTouchDefaults);
            document.addEventListener('gestureend', preventTouchDefaults);

            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            function init() {
                resizeCanvas();
                squareWorldX = worldWidth / 2 - SQUARE_SIZE / 2;
                squareWorldY = worldHeight / 2 - SQUARE_SIZE / 2;
                
                // اطمینان از اینکه مربع داخل مانع شروع نشود
                if (isSquareCollidingWithObstacle(squareWorldX, squareWorldY, 0)) {
                    squareWorldX = obstacleCenterX + OBSTACLE_RADIUS + 50;
                    squareWorldY = obstacleCenterY;
                }
                
                targetWorldX = squareWorldX + SQUARE_SIZE/2;
                targetWorldY = squareWorldY + SQUARE_SIZE/2;
                hasTarget = false;
                targetAlpha = 0;
                waypoints = [];
                trailPositions.length = 0;
                for (let i = 0; i < TRAIL_LENGTH; i++) {
                    trailPositions.push({ x: squareWorldX, y: squareWorldY });
                }
                cameraX = squareWorldX + SQUARE_SIZE/2 - canvas.width/2;
                cameraY = squareWorldY + SQUARE_SIZE/2 - canvas.height/2;
                updateCamera();
                animationLoop();
            }

            init();
        })();
    </script>
</body>
</html>
